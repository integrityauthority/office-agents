name: Release Word

on:
  push:
    tags:
      - "word-v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Word
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Validate manifests
        run: pnpm --filter @office-agents/word exec office-addin-manifest validate manifest.xml && pnpm --filter @office-agents/word exec office-addin-manifest validate manifest.prod.xml

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#word-v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" packages/word/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for ${VERSION}, falling back to Unreleased"
            NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' packages/word/CHANGELOG.md)
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/word/dist --project-name=openword --branch=main --commit-dirty=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
